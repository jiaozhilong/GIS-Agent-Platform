spring:
  application:
    name: gis-agent-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/gisagent
    username: ${DB_USERNAME:gisagent}
    password: ${DB_PASSWORD:gisagent}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    expiration-ms: 86400000  # 24 hours
    master-key: ${APP_MASTER_KEY:}  # API Key 加密主密钥（生产务必通过环境变量注入）

# LLM Default Configuration (users override via UI)
llm:
  default-timeout-seconds: 120
  max-retries: 2

# IMA Configuration
# 默认连接真实 IMA API（Wiki v1）。仅当显式设置 IMA_MOCK_ENABLED=true
# 且手动恢复 MockIMAKnowledgeBaseConnector 的 @Component 时才会走 Mock。
ima:
  connect-timeout-seconds: 10
  search-timeout-seconds: 30
  mock-enabled: ${IMA_MOCK_ENABLED:false}

# File Storage
storage:
  upload-dir: ${STORAGE_DIR:./data/uploads}
  export-dir: ${STORAGE_DIR:./data/exports}

# Server
server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.gisagent: DEBUG
    org.springframework.security: INFO
